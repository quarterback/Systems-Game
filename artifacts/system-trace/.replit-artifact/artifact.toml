kind = "web"
previewPath = "/"
title = "System Trace: A Service Design Simulation"
version = "1.0.0"
id = "artifacts/system-trace"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21533

[services.development]
run = "pnpm --filter @workspace/system-trace run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/system-trace", "run", "build" ]
publicDir = "artifacts/system-trace/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21533"
BASE_PATH = "/"
